<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latexy — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09090b;
      color: #e4e4e7;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
    }
    .card {
      text-align: center;
      padding: 2.5rem 3rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      background: rgba(255,255,255,0.03);
      max-width: 420px;
      width: 90%;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      color: #a855f7;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; color: #f4f4f5; }
    p { font-size: 0.875rem; color: #71717a; line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.25);
      color: #c084fc;
      font-size: 0.75rem;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
    }
    .dot {
      width: 6px; height: 6px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: rgba(168,85,247,0.2);
      border: 1px solid rgba(168,85,247,0.35);
      color: #c084fc;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: rgba(168,85,247,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">L</div>
    <h1>You're offline</h1>
    <p>Latexy couldn't reach the server. Your drafts are saved locally and will sync automatically when you reconnect.</p>
    <div class="badge">
      <span class="dot"></span>
      No internet connection
    </div>
    <br />
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>

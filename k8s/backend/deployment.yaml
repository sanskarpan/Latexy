apiVersion: apps/v1
kind: Deployment
metadata:
  name: latexy-backend
  namespace: latexy
  labels:
    app: latexy-backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: latexy-backend
  template:
    metadata:
      labels:
        app: latexy-backend
        version: v1
    spec:
      containers:
      - name: backend
        image: ghcr.io/your-org/latexy-backend:latest
        ports:
        - containerPort: 8030
        env:
        - name: FASTAPI_ENV
          value: "production"
        - name: DEBUG
          value: "false"
        - name: PORT
          value: "8030"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: anthropic-api-key
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: google-api-key
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: openrouter-api-key
        - name: API_KEY_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: api-key-encryption-key
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: better-auth-secret
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: jwt-secret-key
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: razorpay-key-id
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: razorpay-key-secret
        - name: RAZORPAY_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: latexy-secrets
              key: razorpay-webhook-secret
        - name: BETTER_AUTH_URL
          valueFrom:
            configMapKeyRef:
              name: latexy-config
              key: frontend-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8030
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8030
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: temp-storage
          mountPath: /app/temp
      imagePullSecrets:
      - name: registry-secret
      volumes:
      - name: temp-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: latexy-backend-service
  namespace: latexy
  labels:
    app: latexy-backend
spec:
  selector:
    app: latexy-backend
  ports:
  - protocol: TCP
    port: 8030
    targetPort: 8030
  type: ClusterIP

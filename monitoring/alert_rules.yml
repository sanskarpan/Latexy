groups:
  - name: latexy.service
    rules:
      - alert: ServiceDown
        expr: up{job=~"latexy-backend|redis-exporter|postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."
          runbook: "docs/observability/runbooks.md#servicedown"

      - alert: BackendHighErrorRate
        expr: sum(rate(latexy_http_requests_total{job="latexy-backend",status_code=~"5.."}[5m])) / clamp_min(sum(rate(latexy_http_requests_total{job="latexy-backend"}[5m])), 1) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High HTTP 5xx error rate on backend"
          description: "Backend 5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."
          runbook: "docs/observability/runbooks.md#backendhigherrorrate"

      - alert: SlowBackendResponses
        expr: histogram_quantile(0.95, sum by (le) (rate(latexy_http_request_duration_seconds_bucket{job="latexy-backend"}[5m]))) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Slow backend responses (p95 > 2s)"
          description: "95th percentile response time is {{ $value | humanizeDuration }}."
          runbook: "docs/observability/runbooks.md#slowbackendresponses"

      - alert: CeleryTaskFailures
        expr: increase(latexy_celery_tasks_total{status=~"failure|failed"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Celery task failures detected"
          description: "{{ $value }} tasks failed within the last 5 minutes."
          runbook: "docs/observability/runbooks.md#celerytaskfailures"

  - name: latexy.redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is not responding."
          runbook: "docs/observability/runbooks.md#redisdown--redishighmemory"

      - alert: RedisHighMemory
        expr: (redis_memory_used_bytes / clamp_min(redis_memory_max_bytes, 1)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis memory usage above 80%"
          description: "Redis is using {{ $value | humanize }}% of max memory."
          runbook: "docs/observability/runbooks.md#redisdown--redishighmemory"

      - alert: RedisRejectedConnections
        expr: increase(redis_rejected_connections_total[1m]) > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis is rejecting connections"
          description: "Redis rejected {{ $value }} connections in the last minute."
          runbook: "docs/observability/runbooks.md#redisdown--redishighmemory"

  - name: latexy.postgres
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding."
          runbook: "docs/observability/runbooks.md#postgresdown--postgrestoomanyconnections--postgresdeadlocks"

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL has too many active connections"
          description: "{{ $value }} active connections (limit ~100)."
          runbook: "docs/observability/runbooks.md#postgresdown--postgrestoomanyconnections--postgresdeadlocks"

      - alert: PostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="latexy"}[5m]) > 5
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "{{ $value }} deadlocks in the last 5 minutes."
          runbook: "docs/observability/runbooks.md#postgresdown--postgrestoomanyconnections--postgresdeadlocks"

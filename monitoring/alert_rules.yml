groups:
  - name: latexy.service
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{name=~"latexy-.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.name }}"
          description: "Container {{ $labels.name }} CPU usage is {{ $value | humanize }}% for more than 5 minutes."

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{name=~"latexy-.*"} / container_spec_memory_limit_bytes{name=~"latexy-.*"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.name }}"
          description: "Container {{ $labels.name }} memory usage is {{ $value | humanize }}% of limit."

      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{job="latexy-backend", status=~"5.."}[5m]) / rate(http_requests_total{job="latexy-backend"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate on backend"
          description: "Backend 5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: SlowBackendResponses
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="latexy-backend"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow backend responses (p95 > 2s)"
          description: "95th percentile response time is {{ $value | humanizeDuration }}."

  - name: latexy.redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is not responding."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 80%"
          description: "Redis is using {{ $value | humanize }}% of max memory."

      - alert: RedisRejectedConnections
        expr: increase(redis_rejected_connections_total[1m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Redis is rejecting connections"
          description: "Redis rejected {{ $value }} connections in the last minute."

  - name: latexy.postgres
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding."

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL has too many active connections"
          description: "{{ $value }} active connections (limit ~100)."

      - alert: PostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="latexy"}[5m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "{{ $value }} deadlocks in the last 5 minutes."

  - name: latexy.disk
    rules:
      - alert: DiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value | humanize }}% disk space remaining on /."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space"
          description: "Only {{ $value | humanize }}% disk space remaining on /. Immediate action required."

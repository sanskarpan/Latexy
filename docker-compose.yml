# ─────────────────────────────────────────────────────────────────────────────
# Latexy — Local Development Stack
#
# All host-side ports and container names are parameterised so multiple
# worktrees can run side-by-side against the shared infra (postgres, redis,
# minio).
#
# Default (slot 1 / main worktree) — just `docker compose up`:
#   5180  → Next.js frontend
#   8030  → FastAPI backend + WebSocket
#   5434  → PostgreSQL (for DB clients like TablePlus)
#   5555  → Flower (Celery monitor)
#   9091  → MinIO Web Console
#
# Extra worktrees — use the helper script:
#   ./scripts/worktree-up.sh w2      # backend 8031, frontend 5181, flower 5556
#   ./scripts/worktree-up.sh w3      # backend 8032, frontend 5182, flower 5557
#
# Or manually:
#   SLOT=2 docker compose -p latexy-w2 up backend worker frontend
# ─────────────────────────────────────────────────────────────────────────────

x-slot: &slot "${SLOT:-1}"

x-backend-env: &backend-env
  DATABASE_URL: postgresql://latexy:latexy_password@postgres:5432/latexy
  REDIS_URL: redis://redis:6379/0
  REDIS_CACHE_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin_secret
  MINIO_BUCKET: latexy
  BETTER_AUTH_URL: http://localhost:${FRONTEND_PORT:-5180}
  CORS_ORIGINS: '["http://localhost:${FRONTEND_PORT:-5180}","http://127.0.0.1:${FRONTEND_PORT:-5180}","http://localhost:5180","http://localhost:5181","http://localhost:5182","http://localhost:5183"]'
  TEMP_DIR: /app/temp
  PYTHONPATH: /app

services:
  # ── PostgreSQL (pgvector-enabled for semantic matching) ─────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: latexy-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: latexy
      POSTGRES_PASSWORD: latexy_password
      POSTGRES_DB: latexy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latexy -d latexy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: latexy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: latexy-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9091}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: latexy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin_secret &&
        mc mb --ignore-existing local/latexy &&
        mc anonymous set download local/latexy &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-backend-${SLOT:-1}
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8030 --log-level info --reload --reload-dir /app/app"
    ports:
      - "${BACKEND_PORT:-8030}:8030"
    environment:
      <<: *backend-env
      PORT: 8030
      DEBUG: "false"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_temp_${SLOT:-1}:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 300s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-worker-${SLOT:-1}
    restart: unless-stopped
    command: >
      watchmedo auto-restart --directory=/app/app --pattern="*.py" --recursive --
      celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=latex,llm,combined,ats,cleanup,email
    environment:
      <<: *backend-env
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_temp_${SLOT:-1}:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-beat-${SLOT:-1}
    restart: unless-stopped
    command: >
      watchmedo auto-restart --directory=/app/app --pattern="*.py" --recursive --
      celery -A app.core.celery_app beat --loglevel=info --schedule=/var/lib/celery/beat.db
    environment:
      <<: *backend-env
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - celery_beat_data_${SLOT:-1}:/var/lib/celery
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: latexy-frontend-${SLOT:-1}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5180}:${FRONTEND_PORT:-5180}"
    environment:
      DATABASE_URL: postgresql://latexy:latexy_password@postgres:5432/latexy
      BETTER_AUTH_URL: http://localhost:${FRONTEND_PORT:-5180}
      NEXT_PUBLIC_APP_URL: http://localhost:${FRONTEND_PORT:-5180}
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8030}
      NEXT_PUBLIC_WS_URL: ws://localhost:${BACKEND_PORT:-8030}
      PORT: ${FRONTEND_PORT:-5180}
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  # ── Flower (Celery monitoring) ────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-flower-${SLOT:-1}
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      <<: *backend-env
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_temp_1:
  backend_temp_2:
  backend_temp_3:
  backend_temp_4:
  celery_beat_data_1:
  celery_beat_data_2:
  celery_beat_data_3:
  celery_beat_data_4:

networks:
  default:
    name: latexy-network

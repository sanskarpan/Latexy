version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Latexy — Local Development Stack
#
# Services:
#   postgres   — PostgreSQL 16 database (port 5432)
#   redis      — Redis 7 (Celery broker + event bus, port 6379)
#   minio      — MinIO (S3 API internal-only, Console → localhost:9091)
#   backend    — FastAPI app → localhost:8030 (auto-runs migrations)
#   worker     — Celery worker (latex, llm, combined, ats queues)
#   beat       — Celery beat (scheduled tasks)
#   flower     — Celery monitoring UI → localhost:5555
#   frontend   — Next.js dev server → localhost:5180
#
# Quick start (everything):
#   docker compose up --build
#
# Host port map:
#   5180  → Next.js frontend
#   8030  → FastAPI backend + WebSocket
#   5434  → PostgreSQL (for DB clients like TablePlus)
#   5555  → Flower (Celery monitor)
#   9091  → MinIO Web Console
#   Redis + MinIO S3 API are internal-only (no host binding)
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  DATABASE_URL: postgresql://latexy:latexy_password@postgres:5432/latexy
  REDIS_URL: redis://redis:6379/0
  REDIS_CACHE_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin_secret
  MINIO_BUCKET: latexy
  BETTER_AUTH_URL: http://localhost:5180
  CORS_ORIGINS: '["http://localhost:5180","http://127.0.0.1:5180"]'
  TEMP_DIR: /app/temp
  PYTHONPATH: /app

services:
  # ── PostgreSQL (pgvector-enabled for semantic matching) ─────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: latexy-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: latexy
      POSTGRES_PASSWORD: latexy_password
      POSTGRES_DB: latexy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latexy -d latexy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: latexy-redis
    restart: unless-stopped
    # No host port — services access via Docker network (redis:6379)
    # Uncomment below if you need redis-cli from your Mac:
    # ports:
    #   - "6380:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: latexy-minio
    restart: unless-stopped
    ports:
      - "9091:9001"   # Web console at localhost:9091 (S3 API stays internal)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: latexy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin_secret &&
        mc mb --ignore-existing local/latexy &&
        mc anonymous set download local/latexy &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-backend
    restart: unless-stopped
    # Run migrations then start the server
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8030 --log-level info --reload --reload-dir /app/app"
    ports:
      - "8030:8030"
    environment:
      <<: *backend-env
      PORT: 8030
      DEBUG: "false"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-worker
    restart: unless-stopped
    command: >
      watchmedo auto-restart --directory=/app/app --pattern="*.py" --recursive --
      celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=latex,llm,combined,ats,cleanup,email
    environment:
      <<: *backend-env
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-beat
    restart: unless-stopped
    command: >
      watchmedo auto-restart --directory=/app/app --pattern="*.py" --recursive --
      celery -A app.core.celery_app beat --loglevel=info --schedule=/var/lib/celery/beat.db
    environment:
      <<: *backend-env
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - celery_beat_data:/var/lib/celery
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: latexy-frontend
    restart: unless-stopped
    ports:
      - "5180:5180"
    environment:
      # Server-side: Better Auth pg pool connects to the local postgres container
      DATABASE_URL: postgresql://latexy:latexy_password@postgres:5432/latexy
      BETTER_AUTH_URL: http://localhost:5180
      # Client-side defaults in next.config.js already point to localhost:8030
      # Secrets (BETTER_AUTH_SECRET, JWT_SECRET_KEY, OPENAI_API_KEY, etc.)
      # come from the env_file below
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep container's installed node_modules
      - /app/.next          # keep container's build cache
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── Flower (Celery monitoring) ────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: latexy-flower
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      <<: *backend-env
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_temp:
  celery_beat_data:

networks:
  default:
    name: latexy-network
